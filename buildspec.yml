version: 0.2

phases:
  install:
    runtime-version:
      nodejs: 18
    commands:
      -  echo "Installing dependency"
      -  npm ci --legacy-peer-deps
      
  build:
    commands:
      -  echo "Buiding the app"
      -  npm run build
      
artifacts:
  files:
  -  "**/*"

  base-directory:  dist
  discard-path:  no
    
